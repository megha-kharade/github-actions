name: Hello world

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        run: echo "a demo build"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test step
        run: echo "a test step"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy step
        run: echo "a deploying step"
